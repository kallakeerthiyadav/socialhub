
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Social Hub Profile

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:black;

color:white;

}

.top{

padding:50px;

display:flex;

gap:60px;

align-items:center;

border-bottom:1px solid #222;

}

.profilePic{

width:180px;

height:180px;

border-radius:50%;

object-fit:cover;

border:4px solid hotpink;

}

.info{

flex:1;

}

.username{

font-size:42px;

font-weight:bold;

}

.stats{

display:flex;

gap:40px;

margin-top:20px;

}

.bio{

margin-top:20px;

color:#bbb;

}

.btns{

display:flex;

gap:15px;

margin-top:25px;

flex-wrap:wrap;

}

.btn{

padding:14px 25px;

border:none;

border-radius:10px;

background:#222;

color:white;

cursor:pointer;

}

.posts{

padding:40px;

display:grid;

grid-template-columns:

repeat(3,1fr);

gap:20px;

}

.post{

background:#111;

border-radius:15px;

overflow:hidden;

}

.post img{

width:100%;

height:320px;

object-fit:cover;

}

.overlay{

padding:20px;

}

.deleteBtn{

width:100%;

padding:12px;

margin-top:10px;

border:none;

background:red;

border-radius:10px;

color:white;

cursor:pointer;

}

@media(max-width:900px){

.top{

flex-direction:column;

text-align:center;

}

.posts{

grid-template-columns:

repeat(2,1fr);

}

}

</style>

</head>

<body>



<div class="top">


<img

id="profilePic"

class="profilePic"

src="logo.jpg">


<div class="info">


<div

id="username"

class="username">

social_user

</div>


<div

id="stats"

class="stats">

</div>


<div

id="bio"

class="bio">

Connect • Share • Grow

</div>


<div class="btns">


<button class="btn">

Edit Profile

</button>


<button class="btn">

Share Profile

</button>


<button

class="btn"

onclick="window.location='feed.html'">

Back To Feed

</button>


</div>


</div>


</div>




<div

class="posts"

id="posts">

</div>




<script>


const user={

username:"social_user",

profilePic:"logo.jpg",

bio:"Connect • Share • Grow"

};



document.getElementById(

"profilePic"

).src=

user.profilePic;


document.getElementById(

"username"

).innerHTML=

user.username+" ✓";


document.getElementById(

"bio"

).innerHTML=

user.bio;



let myPosts=

JSON.parse(

localStorage.getItem(

"posts"

)

)||[];



function updateStats(){

document.getElementById(

"stats"

).innerHTML=

`

<div>

<b>

${myPosts.length}

</b>

Posts

</div>


<div>

<b>

0

</b>

Followers

</div>


<div>

<b>

0

</b>

Following

</div>

`;

}



function deletePost(index){

myPosts.splice(

index,

1

);


localStorage.setItem(

"posts",

JSON.stringify(

myPosts

)

);


updateStats();

render();

}



function render(){

let html="";


if(

myPosts.length===0

){

html=`

<h2>

No Posts Uploaded Yet

</h2>

`;

}


myPosts.forEach((post,i)=>{


html+=`

<div class="post">


<img

src="${post.image}">


<div class="overlay">


<p>

❤️ ${post.likes || 0}

</p>


<p>

${post.caption || ""}

</p>


<button

class="deleteBtn"

onclick="deletePost(${i})">

Delete Post

</button>


</div>


</div>

`;

});


document.getElementById(

"posts"

).innerHTML=

html;

}



updateStats();

render();

</script>

</body>

</html>
