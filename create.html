
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Create Post

</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;

color:white;

padding:30px;

}

.container{

max-width:700px;

margin:auto;

}

.create{

background:#111;

padding:25px;

border-radius:20px;

}

h1{

text-align:center;

margin-bottom:20px;

}

input,textarea{

width:100%;

padding:15px;

margin-top:15px;

background:#222;

border:none;

border-radius:10px;

color:white;

}

textarea{

height:120px;

resize:none;

}

.btn{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

background:

linear-gradient(
90deg,
orange,
hotpink,
purple);

color:white;

}

.preview{

display:none;

margin-top:25px;

}

.preview img{

width:100%;

border-radius:15px;

max-height:450px;

object-fit:cover;

}

.backBtn{

padding:12px 20px;

margin-bottom:20px;

border:none;

border-radius:10px;

cursor:pointer;

background:#222;

color:white;

}

</style>

</head>

<body>


<div class="container">


<button

class="backBtn"

onclick="window.location='feed.html'">

← Back To Feed

</button>



<div class="create">


<h1>

Create Post

</h1>


<input

id="username"

placeholder="Username">


<input

type="file"

id="image"

accept="image/*">


<textarea

id="caption"

placeholder="Write caption...">

</textarea>


<button

class="btn"

onclick="createPost()">

Share Post

</button>



<div

class="preview"

id="preview">

<h3>

Preview

</h3>

<br>

<img id="previewImg">

</div>


</div>


</div>




<script>

async function createPost(){

let username=

document.getElementById(

"username"

).value ||

"social_user";


let caption=

document.getElementById(

"caption"

).value;


let file=

document.getElementById(

"image"

).files[0];


if(!file){

alert(

"Select Image"

);

return;

}


let reader=

new FileReader();


reader.onload=

async function(){


let post={

username:

username,

profilePic:

"logo.jpg",

image:

reader.result,

caption:

caption,

likes:[],

comments:[]

};


try{


const response=

await fetch(

"http://localhost:5000/api/posts/create",

{

method:"POST",

headers:{

"Content-Type":

"application/json",

Authorization:

localStorage.getItem(

"token"

)||""

},

body:

JSON.stringify(

post

)

}

);


const data=

await response.json();


if(response.ok){

document.getElementById(

"preview"

).style.display=

"block";


document.getElementById(

"previewImg"

).src=

reader.result;


alert(

"Post Created"

);


setTimeout(()=>{

window.location=

"feed.html";

},1000);

}

else{

alert(

data.message

);

}


}

catch(err){

console.log(err);

alert(

"Backend Not Running"

);

}


};


reader.readAsDataURL(

file

);

}


</script>

</body>

</html>
