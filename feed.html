
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Social Hub Feed

</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;
color:white;

}

.sidebar{

position:fixed;

left:0;

top:0;

width:90px;

height:100vh;

background:black;

display:flex;

flex-direction:column;

align-items:center;

padding-top:20px;

gap:20px;

border-right:1px solid #222;

}

.sideBtn{

width:60px;

height:60px;

background:#111;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

color:white;

text-decoration:none;

font-size:24px;

}

.profileMini{

width:45px;

height:45px;

border-radius:50%;

}

.main{

margin-left:90px;

padding:30px;

display:flex;

flex-direction:column;

align-items:center;

}

.storyWrapper{

display:flex;

align-items:center;

gap:10px;

margin-bottom:30px;

}

.storyArrow{

width:45px;

height:45px;

border:none;

border-radius:50%;

background:#111;

color:white;

font-size:24px;

cursor:pointer;

}

.stories{

display:flex;

gap:20px;

overflow:hidden;

width:760px;

scroll-behavior:smooth;

}

.story{

cursor:pointer;

text-align:center;

min-width:80px;

}

.story img{

width:75px;

height:75px;

border-radius:50%;

border:3px solid hotpink;

}

.post{

background:#111;

width:650px;

border-radius:20px;

overflow:hidden;

margin-bottom:35px;

}

.top{

display:flex;

gap:15px;

padding:20px;

align-items:center;

}

.profile{

width:50px;

height:50px;

border-radius:50%;

}

.postImg{

width:100%;

height:500px;

object-fit:cover;

}

.actions{

padding:20px;

display:flex;

gap:25px;

font-size:28px;

cursor:pointer;

}

.caption{

padding:0 20px 20px;

}

.commentArea{

padding:20px;

}

.commentInput{

width:100%;

padding:12px;

background:#222;

border:none;

border-radius:10px;

color:white;

}

.commentBtn{

margin-top:10px;

padding:10px 20px;

border:none;

border-radius:10px;

cursor:pointer;

}

.singleComment{

background:#222;

padding:10px;

margin-top:10px;

border-radius:10px;

}

#storyViewer{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100vh;

background:black;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999;

}

.storyViewerImg{

max-width:90%;

max-height:75vh;

border-radius:20px;

}

.storyLike{

margin-top:20px;

font-size:40px;

cursor:pointer;

}

.storyNav{

position:absolute;

top:50%;

transform:translateY(-50%);

width:60px;

height:60px;

border:none;

border-radius:50%;

background:#111;

color:white;

font-size:28px;

cursor:pointer;

}

.left{

left:30px;

}

.right{

right:30px;

}

.close{

position:absolute;

top:20px;

right:30px;

font-size:40px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="sidebar">

<a href="feed.html" class="sideBtn">

<i class="fa-solid fa-house"></i>

</a>

<a href="create.html" class="sideBtn">

<i class="fa-solid fa-plus"></i>

</a>

<a href="reels.html" class="sideBtn">

<i class="fa-solid fa-clapperboard"></i>

</a>

<a href="saved.html" class="sideBtn">

<i class="fa-regular fa-bookmark"></i>

</a>

<a href="profile.html" class="sideBtn">

<img src="logo.jpg"

class="profileMini">

</a>

</div>



<div class="main">

<div class="storyWrapper">

<button

class="storyArrow"

onclick="moveStories(-250)">

&lt;

</button>

<div

class="stories"

id="stories">

</div>

<button

class="storyArrow"

onclick="moveStories(250)">

&gt;

</button>

</div>

<div id="feed"></div>

</div>



<div id="storyViewer">

<div class="close"

onclick="closeStory()">

✕

</div>

<button

class="storyNav left"

onclick="prevStory()">

&lt;

</button>

<img

id="storyImg"

class="storyViewerImg">

<button

class="storyNav right"

onclick="nextStory()">

&gt;

</button>

<div

class="storyLike"

id="storyLike"

onclick="toggleStoryLike()">

🤍

</div>

</div>



<script>

const stories=[];

const posts=[];

let currentStory=0;

for(let i=1;i<=12;i++){

stories.push({

img:`https://picsum.photos/400/700?story${i}`,

liked:false

});

}

for(let i=1;i<=50;i++){

posts.push({

username:"user_"+i,

profile:`https://picsum.photos/70?${i}`,

image:`https://picsum.photos/700/500?${i}`,

caption:"Beautiful memories ✨",

likes:Math.floor(Math.random()*1000),

liked:false,

saved:false,

comments:[]

});

}

function renderStories(){

let html="";

stories.forEach((s,i)=>{

html+=`

<div class="story"

onclick="openStory(${i})">

<img src="${s.img}">

<p>user${i}</p>

</div>

`;

});

document.getElementById(

"stories"

).innerHTML=html;

}

function moveStories(x){

document.getElementById(

"stories"

).scrollLeft+=x;

}

function openStory(i){

currentStory=i;

storyViewer.style.display="flex";

storyImg.src=stories[i].img;

storyLike.innerHTML=

stories[i].liked?"❤️":"🤍";

}

function toggleStoryLike(){

stories[currentStory].liked=

!stories[currentStory].liked;

storyLike.innerHTML=

stories[currentStory].liked?"❤️":"🤍";

}

function nextStory(){

currentStory++;

if(currentStory>=stories.length)

currentStory=0;

openStory(currentStory);

}

function prevStory(){

currentStory--;

if(currentStory<0)

currentStory=

stories.length-1;

openStory(currentStory);

}

function closeStory(){

storyViewer.style.display="none";

}

function likePost(i){

posts[i].liked=!posts[i].liked;

posts[i].likes += posts[i].liked ? 1 : -1;

render();

}


function savePost(i){

posts[i].saved=

!posts[i].saved;


let saved=

JSON.parse(

localStorage.getItem(

"savedPosts"

)

)||[];


if(

posts[i].saved

){

let exists=

saved.find(

p=>p.image===posts[i].image

);


if(!exists){

saved.push({

username:

posts[i].username,

profile:

posts[i].profile,

image:

posts[i].image,

caption:

posts[i].caption

});

}

}

else{

saved=

saved.filter(

p=>p.image!==posts[i].image

);

}


localStorage.setItem(

"savedPosts",

JSON.stringify(

saved

));


render();

}

function addComment(i){

let input=

document.getElementById(

"comment"+i

);

if(input.value==="") return;

posts[i].comments.push({

name:"You",

text:input.value

});

render();

}

function render(){

let html="";

posts.forEach((p,i)=>{

html+=`

<div class="post">

<div class="top">

<img class="profile"

src="${p.profile}">

<b>${p.username}</b>

</div>

<img class="postImg"

src="${p.image}">

<div class="actions">

<span onclick="likePost(${i})">

${p.liked?"❤️":"🤍"}

${p.likes}

</span>

<span onclick="savePost(${i})">

${p.saved?"🔖":"📑"}

</span>

</div>

<div class="caption">

${p.caption}

</div>

<div class="commentArea">

<input

id="comment${i}"

class="commentInput"

placeholder="Write comment...">

<button

class="commentBtn"

onclick="addComment(${i})">

Comment

</button>

${p.comments.map(c=>`

<div class="singleComment">

<b>${c.name}</b>

${c.text}

</div>

`).join("")}

</div>

</div>

`;

});

feed.innerHTML=html;

}

renderStories();

render();

</script>

</body>

</html>
