
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Notifications

</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;

color:white;

padding:30px;

}

.container{

max-width:700px;

margin:auto;

}

.title{

font-size:35px;

margin-bottom:30px;

}

.card{

background:#111;

padding:25px;

border-radius:15px;

margin-bottom:20px;

}

.time{

color:#888;

margin-top:10px;

font-size:14px;

}

.empty{

text-align:center;

padding:100px;

color:#777;

}

</style>

</head>

<body>


<div class="container">


<h1 class="title">

Notifications

</h1>


<div id="notifications">

</div>


</div>



<script>


if(

!localStorage.getItem(
"token"
)

){

window.location=

"index.html";

}



async function loadNotifications(){


try{


const response=

await fetch(

"http://localhost:5000/api/notifications",

{

headers:{

Authorization:

localStorage.getItem(
"token"
)

}

}

);


const data=

await response.json();


render(

data

);


}

catch(err){

console.log(err);

}


}



function render(data){


if(

data.length===0

){

document.getElementById(

"notifications"

).innerHTML=

`

<div class="empty">

No Notifications Yet

</div>

`;

return;

}



let html="";


data.forEach(n=>{


html+=`

<div class="card">


<h3>

${n.senderName}

</h3>


<p>

${n.message}

</p>


<div class="time">

${new Date(

n.createdAt

).toLocaleString()}

</div>


</div>

`;

});


document.getElementById(

"notifications"

).innerHTML=

html;


}



loadNotifications();

</script>

</body>

</html>
