
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Social Hub Login

</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:black;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.loginBox{

width:380px;

background:#111;

padding:40px;

border-radius:25px;

display:flex;

flex-direction:column;

align-items:center;

}

.logoImg{

width:150px;

height:150px;

border-radius:20px;

object-fit:cover;

margin-bottom:20px;

}

.appName{

font-size:42px;

color:white;

margin-bottom:10px;

}

.tagline{

color:#888;

margin-bottom:30px;

}

.loginInput{

width:100%;

padding:15px;

margin-bottom:15px;

background:#222;

border:none;

border-radius:12px;

color:white;

font-size:16px;

}

.loginBtn{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:

linear-gradient(
90deg,
orange,
hotpink,
purple);

color:white;

font-size:18px;

cursor:pointer;

margin-top:10px;

}

.registerBtn{

width:100%;

padding:15px;

margin-top:15px;

background:#222;

border:none;

border-radius:12px;

color:white;

cursor:pointer;

}

</style>

</head>

<body>


<div class="loginBox">


<img
src="logo.jpg"
class="logoImg">


<h1 class="appName">

Social Hub

</h1>


<p class="tagline">

Connect • Share • Grow

</p>


<input

id="email"

class="loginInput"

placeholder="Email">


<input

id="password"

class="loginInput"

type="password"

placeholder="Password">


<button

class="loginBtn"

onclick="openApp()">

Login

</button>


<button

class="registerBtn"

onclick="window.location='register.html'">

Create Account

</button>


</div>



<script>

async function openApp(){

const email=

document.getElementById(

"email"

).value.trim();


const password=

document.getElementById(

"password"

).value.trim();


if(

!email ||

!password

){

alert(

"Fill all fields"

);

return;

}


try{


const response=

await fetch(

"http://localhost:5000/api/auth/login",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify({

email,

password

})

}

);


const data=

await response.json();


if(response.ok){


localStorage.setItem(

"token",

data.token

);


localStorage.setItem(

"user",

JSON.stringify(

data.user

)

);


alert(

"Login Success"

);


window.location=

"feed.html";

}

else{

alert(

data.message ||

"Login Failed"

);

}


}

catch(err){

console.log(err);

alert(

"Backend Not Running"

);

}

}

</script>

</body>

</html>
