
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Social Hub Login

</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.loginBox{

width:380px;

background:#111;

padding:40px;

border-radius:25px;

display:flex;

flex-direction:column;

align-items:center;

}

.logo{

width:140px;

height:140px;

border-radius:20px;

margin-bottom:20px;

object-fit:cover;

}

h1{

font-size:50px;

color:white;

margin-bottom:10px;

}

p{

color:#888;

margin-bottom:30px;

}

.input{

width:100%;

padding:15px;

margin-bottom:15px;

background:#222;

border:none;

border-radius:12px;

color:white;

font-size:16px;

}

.btn{

width:100%;

padding:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

background:

linear-gradient(
90deg,
orange,
hotpink,
purple);

color:white;

margin-top:10px;

}

</style>

</head>

<body>


<div class="loginBox">


<img

src="logo.jpg"

class="logo">


<h1>

Social Hub

</h1>


<p>

Connect • Share • Grow

</p>


<input

id="email"

class="input"

placeholder="Email">


<input

id="password"

class="input"

type="password"

placeholder="Password">


<button

class="btn"

onclick="login()">

Login

</button>


</div>


<script>

function login(){

let email=

document.getElementById(

"email"

).value;

let password=

document.getElementById(

"password"

).value;


if(

email===""

||

password===""

){

alert(

"Fill All Fields"

);

return;

}


/* demo login */

window.location=

"feed.html";

}

</script>

</body>

</html>
