
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Your Activities

</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;

color:white;

}

.header{

padding:25px;

font-size:32px;

font-weight:bold;

border-bottom:1px solid #222;

}

.backBtn{

margin:20px;

padding:12px 20px;

background:#111;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

}

.container{

max-width:700px;

margin:auto;

padding:20px;

}

.post{

background:#111;

border-radius:20px;

overflow:hidden;

margin-bottom:35px;

}

.top{

display:flex;

align-items:center;

gap:15px;

padding:20px;

}

.profile{

width:50px;

height:50px;

border-radius:50%;

}

.postImg{

width:100%;

height:500px;

object-fit:cover;

}

.caption{

padding:20px;

font-size:18px;

}

.empty{

text-align:center;

margin-top:120px;

font-size:24px;

color:gray;

}

</style>

</head>

<body>



<div class="header">

Your Activities

</div>



<button

class="backBtn"

onclick="window.location='feed.html'">

← Back To Feed

</button>




<div

class="container"

id="activities">

</div>




<script>


let activities=

JSON.parse(

localStorage.getItem(

"activities"

)

)||[];



function render(){


let html="";


if(

activities.length===0

){

html=

`

<div class="empty">

No Activities Yet

</div>

`;

}



activities.forEach(

post=>{


html+=`

<div class="post">


<div class="top">


<img

class="profile"

src="${post.profile}">


<b>

${post.username}

</b>


</div>


<img

class="postImg"

src="${post.image}">


<div class="caption">

${post.caption}

</div>


</div>

`;

}


);


document.getElementById(

"activities"

).innerHTML=

html;


}


render();


</script>


</body>

</html>
