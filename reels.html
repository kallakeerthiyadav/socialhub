
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Social Hub Reels

</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

.sidebar{

position:fixed;

left:0;

top:0;

width:90px;

height:100vh;

background:black;

border-right:1px solid #222;

display:flex;

flex-direction:column;

align-items:center;

padding-top:25px;

gap:20px;

z-index:10;

}

.sideBtn{

width:60px;

height:60px;

background:#111;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

color:white;

font-size:24px;

text-decoration:none;

}

.main{

margin-left:90px;

display:flex;

flex-direction:column;

align-items:center;

padding:20px;

}

.reel{

width:380px;

height:760px;

position:relative;

background:#111;

margin-bottom:40px;

border-radius:20px;

overflow:hidden;

}

.reel video{

width:100%;

height:100%;

object-fit:cover;

background:black;

}

.overlay{

position:absolute;

bottom:0;

left:0;

width:100%;

padding:25px;

background:

linear-gradient(

transparent,

rgba(0,0,0,.85)

);

}

.topUser{

display:flex;

align-items:center;

gap:10px;

margin-bottom:15px;

}

.profile{

width:45px;

height:45px;

border-radius:50%;

}

.followBtn{

padding:8px 16px;

border:none;

border-radius:20px;

cursor:pointer;

background:white;

}

.actions{

position:absolute;

right:15px;

bottom:120px;

display:flex;

flex-direction:column;

gap:25px;

font-size:30px;

align-items:center;

}

.icon{

cursor:pointer;

}

.count{

font-size:14px;

}

.caption{

margin-top:10px;

line-height:1.6;

}

</style>

</head>

<body>


<div class="sidebar">

<a href="feed.html"
class="sideBtn">

<i class="fa-solid fa-house"></i>

</a>

<a href="create.html"
class="sideBtn">

<i class="fa-solid fa-plus"></i>

</a>

<a href="reels.html"
class="sideBtn">

<i class="fa-solid fa-clapperboard"></i>

</a>

<a href="profile.html"
class="sideBtn">

<i class="fa-solid fa-user"></i>

</a>

</div>




<div class="main"

id="reels">

</div>




<script>

const users=[

"nature_world",

"animal_zone",

"travel_addict",

"wild_life",

"cinema_world",

"movie_hub",

"forest_daily",

"planet_earth",

"ocean_view",

"adventure"

];


const captions=[

"Nature never disappoints 🌲",

"Wildlife moments 🐾",

"Travel memories 🌍",

"Beautiful scenery ✨",

"Movie vibes 🎬",

"Ocean therapy 🌊",

"Adventure starts now 🏔️",

"Animal kingdom 🦁",

"Explore everything 🚀",

"Relax and enjoy 🌅"

];


const videos=[

"https://www.w3schools.com/html/movie.mp4",

"https://www.w3schools.com/html/mov_bbb.mp4",

"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscape.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/WeAreGoingOnBullrun.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",

"https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4"

];


let reels=[];


for(

let i=0;

i<100;

i++

){

reels.push({

user:

users[i%

users.length],

caption:

captions[i%

captions.length],

video:

videos[i%

videos.length],

likes:

Math.floor(

Math.random()*9000

),

comments:

Math.floor(

Math.random()*800

),

liked:false,

following:false

});

}



function toggleLike(i){

reels[i].liked=

!reels[i].liked;

if(

reels[i].liked

)

reels[i].likes++;

else

reels[i].likes--;

render();

}



function follow(i){

reels[i].following=

!reels[i].following;

render();

}



function render(){

let html="";


reels.forEach((r,i)=>{

html+=`

<div class="reel">

<video

src="${r.video}"

controls

loop

muted>

</video>


<div class="actions">


<div

class="icon"

onclick="toggleLike(${i})">

${r.liked ?

"❤️"

:

"🤍"}

<div class="count">

${r.likes}

</div>

</div>


<div>

💬

<div class="count">

${r.comments}

</div>

</div>


<div>

📤

</div>


</div>


<div class="overlay">


<div class="topUser">


<img

class="profile"

src="https://picsum.photos/60?${i}">


<b>

${r.user}

</b>


<button

class="followBtn"

onclick="follow(${i})">

${r.following ?

"Following"

:

"Follow"}

</button>


</div>


<div class="caption">

${r.caption}

</div>


</div>


</div>

`;

});


document.getElementById(

"reels"

).innerHTML=

html;

}


render();

</script>

</body>

</html>
