
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Register • Social Hub

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:black;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.container{

width:380px;

background:#111;

padding:40px;

border-radius:20px;

text-align:center;

}

.logo{

width:120px;

height:120px;

border-radius:20px;

margin-bottom:20px;

}

h1{

margin-bottom:25px;

}

.input{

width:100%;

padding:15px;

margin-bottom:15px;

background:#222;

border:none;

border-radius:10px;

color:white;

}

textarea{

height:90px;

resize:none;

}

.btn{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:

linear-gradient(
90deg,
orange,
hotpink,
purple);

color:white;

font-size:18px;

cursor:pointer;

}

.link{

margin-top:20px;

}

a{

color:hotpink;

text-decoration:none;

}

</style>

</head>

<body>


<div class="container">


<img
src="logo.jpg"
class="logo">


<h1>

Create Account

</h1>


<input
class="input"
id="username"
placeholder="Username">


<input
class="input"
id="email"
placeholder="Email">


<input
class="input"
type="password"
id="password"
placeholder="Password">


<input
class="input"
id="profilePic"
placeholder="Profile Picture URL (optional)">


<textarea
class="input"
id="bio"
placeholder="Write Bio">

</textarea>


<button
class="btn"
onclick="register()">

Register

</button>


<div class="link">

Already have account?

<a href="index.html">

Login

</a>

</div>


</div>



<script>

async function register(){

const username=

document.getElementById(

"username"

).value.trim();

const email=

document.getElementById(

"email"

).value.trim();

const password=

document.getElementById(

"password"

).value.trim();

const bio=

document.getElementById(

"bio"

).value.trim();

const profilePic=

document.getElementById(

"profilePic"

).value.trim();


if(

!username ||

!email ||

!password

){

alert(

"Fill Required Fields"

);

return;

}


try{


const response=

await fetch(

"http://localhost:5000/api/auth/register",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify({

username,

email,

password,

bio,

profilePic

})

}

);


const data=

await response.json();


if(response.ok){


localStorage.setItem(

"token",

data.token

);


localStorage.setItem(

"user",

JSON.stringify(

data.user

)

);


alert(

"Registration Successful"

);


window.location=

"feed.html";

}

else{

alert(

data.message ||

"Registration Failed"

);

}


}

catch(err){

console.log(err);

alert(

"Backend Not Running"

);

}

}

</script>

</body>

</html>
