
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>

Edit Profile

</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:black;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.box{

width:400px;

background:#111;

padding:30px;

border-radius:20px;

}

h1{

margin-bottom:25px;

text-align:center;

}

.input{

width:100%;

padding:14px;

margin-bottom:15px;

background:#222;

border:none;

border-radius:10px;

color:white;

}

.preview{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

display:block;

margin:auto;

margin-bottom:20px;

border:3px solid hotpink;

}

.btn{

width:100%;

padding:14px;

border:none;

border-radius:10px;

cursor:pointer;

color:white;

font-size:18px;

background:

linear-gradient(
90deg,
orange,
hotpink,
purple);

}

</style>

</head>

<body>


<div class="box">


<h1>

Edit Profile

</h1>


<img

id="preview"

class="preview"


src="logo.jpg">



<input

type="file"

id="image"

class="input">



<input

id="username"

class="input"

placeholder="Username">



<textarea

id="bio"

class="input"

placeholder="Bio"

style="height:100px">

</textarea>



<button

class="btn"

onclick="updateProfile()">

Save Changes

</button>


</div>




<script>


if(

!localStorage.getItem(
"token"
)

){

window.location=

"index.html";

}



let user=

JSON.parse(

localStorage.getItem(
"user")

);



document.getElementById(

"username"

).value=

user.username || "";


document.getElementById(

"bio"

).value=

user.bio || "";


document.getElementById(

"preview"

).src=

user.profilePic ||

"logo.jpg";




async function updateProfile(){


let file=

document.getElementById(
"image"
).files[0];


let username=

document.getElementById(
"username"
).value;


let bio=

document.getElementById(
"bio"
).value;



function send(pic){


fetch(

"http://localhost:5000/api/users/update",

{

method:"PUT",

headers:{

"Content-Type":

"application/json",

Authorization:

localStorage.getItem(
"token"
)

},

body:

JSON.stringify({

username,

bio,

profilePic:pic

})

}

)

.then(

r=>r.json()

)

.then(data=>{


localStorage.setItem(

"user",

JSON.stringify(data)

);


alert(

"Profile Updated"

);


window.location=

"profile.html";


});


}



if(file){

let reader=

new FileReader();


reader.onload=

()=>send(

reader.result

);


reader.readAsDataURL(file);

}

else{

send(

user.profilePic

);

}


}

</script>

</body>

</html>
